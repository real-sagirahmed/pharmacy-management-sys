name: Deploy to MonsterASP.NET

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Angular Frontend
        run: |
          cd frontend
          npm install --legacy-peer-deps
          # Clean root's wwwroot first
          rm -rf ../wwwroot
          npm run build
          cd ..
          
          # Angular 17+ Application builder outputs to wwwroot/browser
          # Move browser contents to wwwroot root if they exist
          if [ -d "wwwroot/browser" ]; then
            cp -r wwwroot/browser/* wwwroot/
            rm -rf wwwroot/browser
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish .NET Backend
        run: |
          # Ensure publish directory is clean and exists
          rm -rf ./publish
          
          # Build a SELF-CONTAINED win-x64 version (Highly recommended for Shared Hosting/IIS)
          dotnet publish -c Release -r win-x64 --self-contained true -o ./publish
          
          # CRITICAL Check: Ensure the updated wwwroot is in the final publish folder
          rm -rf ./publish/wwwroot
          cp -r wwwroot ./publish/wwwroot
          
          echo "Forcing custom web.config into publish folder..."
          cp web.config ./publish/
          
          echo "Final publish directory structure verification (Recursive):"
          ls -R ./publish

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /wwwroot/
          protocol: ftp
          port: 21
