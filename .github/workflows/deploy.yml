name: Deploy to MonsterASP.NET

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Angular Frontend
        run: |
          cd frontend
          npm install --legacy-peer-deps
          # Clean root's wwwroot first
          rm -rf ../wwwroot
          npm run build
          cd ..
          
          # Angular 17+ Application builder outputs to wwwroot/browser
          # Move browser contents to wwwroot root
          if [ -d "wwwroot/browser" ]; then
            cp -r wwwroot/browser/* wwwroot/
            # Optionally remove browser folder to keep it clean, 
            # but we can leave it as well.
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish .NET Backend
        run: |
          # Ensure publish directory is clean and exists
          rm -rf ./publish
          mkdir -p ./publish
          
          # Build a portable DLL version (default)
          dotnet publish -c Release -o ./publish
          
          # CRITICAL: Ensure the latest wwwroot from the root is in the publish folder
          # Some older files might be cached by dotnet publish
          rm -rf ./publish/wwwroot
          cp -r wwwroot ./publish/wwwroot
          
          echo "Final publish directory structure:"
          ls -R ./publish

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /
          protocol: ftp
          port: 21
