name: Deploy to MonsterASP.NET

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Angular Frontend
        run: |
          cd frontend
          npm install --legacy-peer-deps
          # Clean root's wwwroot first
          rm -rf ../wwwroot
          npm run build
          cd ..
          
          # Angular 17+ Application builder outputs to wwwroot/browser
          # Move browser contents to wwwroot root if they exist
          if [ -d "wwwroot/browser" ]; then
            cp -r wwwroot/browser/* wwwroot/
            rm -rf wwwroot/browser
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish .NET Backend
        run: |
          # Ensure publish directory is clean and exists
          rm -rf ./publish
          
          # Build a FRAMEWORK-DEPENDENT version (Standard for Shared Hosting/IIS)
          dotnet publish -c Release -o ./publish
          
          # CRITICAL Check: Ensure the updated wwwroot is in the final publish folder
          rm -rf ./publish/wwwroot
          cp -r wwwroot ./publish/wwwroot
          
          # CREATE APP_OFFLINE.HTM to unlock files on server
          echo "<html><body style='font-family:sans-serif;text-align:center;padding:50px;'><h1>System Update in Progress</h1><p>We are updating the Pharmacy Management System. Please wait a moment...</p></body></html>" > ./publish/app_offline.htm

          echo "Final publish directory structure verification (Recursive):"
          ls -R ./publish

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /wwwroot/
          protocol: ftp
          port: 21

      - name: Cleanup app_offline.htm (Bring Site Online)
        if: always()
        run: |
          # Use curl to send a DELE command to the FTP server
          # This ensures the site goes back online even if the main sync didn't remove it
          curl --ftp-method single-cwd -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            "ftp://${{ secrets.FTP_SERVER }}/wwwroot/app_offline.htm" -Q "DELE app_offline.htm" || echo "app_offline.htm already removed or not found"
